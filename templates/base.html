<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Stock</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="bg-dark text-white p-3" style="width: 250px; min-height: 100vh;">

        <h4 class="text-center mb-4">Sistema de Stock</h4>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a class="nav-link text-white" href="{% url 'inicio' %}">Inicio</a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white" href="{% url 'stock' %}">Stock</a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white" href="{% url 'agregar_producto' %}">Agregar Producto</a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white" href="{% url 'agregar_categoria' %}">Categoría</a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white" href="{% url 'agregar_proveedor' %}">Proveedor</a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white" href="/admin">Admin</a>
            </li>

        </ul>

    </div>

    <!-- CONTENIDO -->
    <div class="flex-grow-1 p-4">

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-success alert-dismissible fade show">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block content %}
        {% endblock %}

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
