{% extends "base.html" %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="mb-4 text-center"><i class="bi bi-shield-lock"></i> Cambiar Contraseña</h2>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-warning w-100">Actualizar Contraseña</button>
        </form>
        <hr>
        <div class="text-center">
            <a href="{% url 'perfil' %}" class="btn btn-link">Volver al Perfil</a>
        </div>
    </div>
</div>
{% endblock %}
