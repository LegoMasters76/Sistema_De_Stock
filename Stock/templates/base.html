<body>

<div class="container">

<a class="navbar-brand fw-bold" href="{% url 'inicio' %}">

<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">

</ul>
</div>

<div class="container mt-4">

{% if messages %}

{% endfor %}
